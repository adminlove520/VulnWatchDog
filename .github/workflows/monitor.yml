name: CVE Monitor

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:  # Allow manual trigger

# 添加这个权限块
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run CVE monitor
        env:
          DEBUG: ${{ secrets.DEBUG }}
          NOTIFY_TYPE: ${{ secrets.NOTIFY_TYPE }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # GPT配置（支持 minimax / openai / fastgpt）
          GPT_PROVIDER: ${{ secrets.GPT_PROVIDER || 'minimax' }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL || 'MiniMax-M2.7' }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || 'https://api.minimaxi.com/anthropic/v1' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          FASTGPT_API_KEY: ${{ secrets.FASTGPT_API_KEY }}
          FASTGPT_API_URL: ${{ secrets.FASTGPT_API_URL }}
          FASTGPT_MODEL: ${{ secrets.FASTGPT_MODEL || 'gpt-3.5-turbo' }}
          CVE_YEAR_RANGE: ${{ secrets.CVE_YEAR_RANGE || '2025-2026' }}
          GIT_URL: https://github.com/${{ github.repository }}
          # 钉钉通知配置
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          # 飞书通知配置
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          # 搜索引擎配置
          SEARCH_ENGINE: ${{ secrets.SEARCH_ENGINE || 'all' }}
        run: python main.py
        
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "VulnWatchdog[bot]"
          # 提交代码，排除数据库文件
          git add . --ignore-errors
          # 确保数据库文件不会被提交
          git reset HEAD vulns.db || true
          git reset HEAD *.db || true
          # 如果没有更改，commit会失败，加上 || exit 0 防止报错
          git commit -m "Update CVE analysis $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
